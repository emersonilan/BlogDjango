{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Meu Blog</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <header>

        <div class="container nav-container">

            <h1 class="logo">
    Meu Blog
</h1>

            <nav>

                <ul class="nav-links">

    <li>
        <a href="/">
            Home
        </a>
    </li>

    <li>
        <a href="/posts/">
            Posts
        </a>
    </li>

    <li>
        <a href="/sobre/">
            Sobre
        </a>
    </li>

    <button id="theme-toggle">
    🌙
</button>

</ul>

            </nav>

        </div>

    </header>

    <main>

        {% block content %}
        {% endblock %}

    </main>

    <footer>

    <div class="container">

        <p>
            © 2026 - Meu Blog Django
        </p>

    </div>

</footer>

<script>

    const button =
        document.getElementById(
            'theme-toggle'
        )

    const body = document.body

    if (
        localStorage.getItem('theme')
        === 'light'
    ) {

        body.classList.add('light-mode')

        button.innerText = '☀️'
    }

    button.addEventListener(
        'click',
        () => {

            body.classList.toggle(
                'light-mode'
            )

            if (
                body.classList.contains(
                    'light-mode'
                )
            ) {

                localStorage.setItem(
                    'theme',
                    'light'
                )

                button.innerText = '☀️'

            } else {

                localStorage.setItem(
                    'theme',
                    'dark'
                )

                button.innerText = '🌙'
            }

        }
    )

</script> 
</body>
</html>
