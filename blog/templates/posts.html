{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2 class="section-title">
        Todos os Posts
    </h2>

    <div class="posts-grid">

        {% for post in posts %}

        <div class="post-card">

            <h3>
                {{ post.titulo }}
            </h3>

            <p class="post-date">
                {{ post.data_criacao|date:"d/m/Y" }}
            </p>

            <p>
                {{ post.conteudo|truncatewords:20 }}
            </p>

            <a href="/post/{{ post.slug }}/">
                Ler mais
            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
