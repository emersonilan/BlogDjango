{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>
            Login
        </h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Usuário"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Senha"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        {% if erro %}

            <p>
                {{ erro }}
            </p>

        {% endif %}

    </div>

</div>

{% endblock %}
